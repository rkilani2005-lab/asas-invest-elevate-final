    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Preload hero background for faster LCP -->
    <link rel="preload" as="image" href="/images/dubai-skyline.jpg" fetchpriority="high" />

    <!-- Set dir/lang BEFORE React mounts to avoid LTR flash for Arabic users -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('i18nextLng') || '';
          var lang = stored.split('-')[0];
          if (lang !== 'ar' && lang !== 'en') {
            var nav = (navigator.language || 'en').toLowerCase();
            lang = nav.indexOf('ar') === 0 ? 'ar' : 'en';
          }
          var dir = lang === 'ar' ? 'rtl' : 'ltr';
          document.documentElement.lang = lang;
          document.documentElement.dir = dir;
          // <body> doesn't exist yet in <head>; mirror dir on it as soon as it does.
          document.addEventListener('DOMContentLoaded', function () {
            if (document.body) document.body.dir = dir;
          });
        } catch (e) {
          document.documentElement.lang = 'en';
          document.documentElement.dir = 'ltr';
        }
      })();
    </script>
  </head>

  <body>
